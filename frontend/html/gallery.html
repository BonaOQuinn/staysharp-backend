<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Stay Sharp San Diego</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lobster&family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/background.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/gallery.css">
</head>

<body>

    <!-- Animated Background -->
    <div class="grid-background" id="scissorsContainer">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <!-- HEADER -->
    <header id="mainHeader">
        <a href="index.html" class="header-logo">
            <img class="logo-header" src="logos/new_logo.png" alt="Stay Sharp San Diego logo">
        </a>
        <div class="header-right">
            <nav>
                <a href="index.html">Home</a>
                <a href="services.html">Services</a>
                <a href="locations.html">Locations</a>
                <a href="gallery.html" class="active">Gallery</a>
                <a href="contact.html">Contact</a>
            </nav>
            <a href="booking.html" class="book-now-btn">Book Now</a>
        </div>
        <div class="header-gold-line" id="headerGoldLine"></div>
    </header>

    <!-- HERO -->
    <section class="gallery-hero">
        <div class="gallery-label">OUR WORK</div>
        <h1>Gallery</h1>
        <p>Showcasing our craftsmanship and style</p>
        <a href="https://www.instagram.com/staysharpsandiego" target="_blank" class="ig-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="2" width="20" height="20" rx="5" />
                <circle cx="12" cy="12" r="5" />
                <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
            </svg>
            Follow @staysharpsandiego
        </a>
    </section>

    <!-- FILTER BAR -->
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="haircuts">Haircuts</button>
        <button class="filter-btn" data-filter="beard">Beard & Grooming</button>
        <button class="filter-btn" data-filter="vibes">Vibes</button>
    </div>

    <!-- GALLERY GRID -->
    <main class="gallery-main">
        <div class="masonry-grid" id="masonryGrid">
            <div class="gallery-status">
                <div class="gallery-loading-spinner"></div>
                <p>Loading gallery...</p>
            </div>
        </div>
    </main>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
        <button class="lightbox-prev" onclick="event.stopPropagation(); showPrevImage()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <img id="lightboxImg" src="" alt="Gallery image">
        <button class="lightbox-next" onclick="event.stopPropagation(); showNextImage()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </div>

    <!-- FOOTER -->
    <footer>
        <div class="footer-grid">
            <div class="footer-col">
                <img class="footer-logo-img" src="logos/new_logo.png" alt="Stay Sharp San Diego">
                <p class="footer-tagline">Premium barbershop experience in San Diego.</p>
                <div class="footer-socials">
                    <a href="https://www.instagram.com/staysharpsandiego" target="_blank" class="footer-social-link">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="5" />
                            <circle cx="12" cy="12" r="5" />
                            <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
                        </svg>
                        @staysharpsandiego
                    </a>
                    <a href="https://www.instagram.com/howtobarber" target="_blank" class="footer-social-link">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <rect x="2" y="2" width="20" height="20" rx="5" />
                            <circle cx="12" cy="12" r="5" />
                            <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none" />
                        </svg>
                        @howtobarber
                    </a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2025 Stay Sharp San Diego. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/background.js"></script>
    <script src="js/gallery-loader.js"></script>
    <script>
        // Header scroll effect
        (function () {
            var h = document.getElementById('mainHeader');
            if (!h) return;
            function u() {
                h.classList[window.pageYOffset > 10 ? 'add' : 'remove']('scrolled');
            }
            window.addEventListener('scroll', u);
            u();
        })();

        // Keyboard navigation for lightbox
        document.addEventListener('keydown', function (e) {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox || !lightbox.classList.contains('open')) return;

            if (e.key === 'Escape') closeLightbox();
            else if (e.key === 'ArrowLeft') showPrevImage();
            else if (e.key === 'ArrowRight') showNextImage();
        });
    </script>

</body>

</html>
